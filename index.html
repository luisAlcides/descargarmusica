<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Descargar audio o video</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      display: grid;
      min-height: 100vh;
      margin: 0;
      place-items: center;
      background: #101114;
      color: #f4f4f5;
      font-family: Arial, sans-serif;
    }

    main {
      width: min(440px, calc(100% - 32px));
      padding: 28px;
      border: 1px solid #2d2f36;
      border-radius: 18px;
      background: #181a20;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.6rem;
    }

    p {
      margin: 0 0 22px;
      color: #a1a1aa;
      line-height: 1.5;
    }

    form {
      display: grid;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 7px;
      font-weight: 700;
    }

    input,
    select,
    button {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 13px 14px;
      font: inherit;
    }

    input,
    select {
      border: 1px solid #333640;
      outline: none;
      background: #0f1014;
      color: #ffffff;
    }

    input:focus,
    select:focus {
      border-color: #7c5cff;
    }

    button {
      margin-top: 6px;
      background: #7c5cff;
      color: #ffffff;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover {
      background: #6b4dff;
    }

    .error {
      display: none;
      margin-top: 14px;
      padding: 12px;
      border-radius: 12px;
      background: #3a171a;
      color: #ffd7d7;
      line-height: 1.45;
    }

    .error.show {
      display: block;
    }

    .progress-container {
      display: none;
      margin-top: 14px;
    }

    .progress-container.show {
      display: block;
    }

    .progress-bar-bg {
      width: 100%;
      height: 12px;
      background: #333640;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .progress-bar-fill {
      height: 100%;
      background: #7c5cff;
      width: 0%;
      transition: width 0.3s ease;
    }

    .progress-text {
      font-size: 0.9rem;
      color: #a1a1aa;
      text-align: center;
    }
  </style>
</head>
<body>
  <main>
    <h1>Descargar</h1>
    <p>Pega un enlace de YouTube u otro sitio compatible, o un enlace directo a un archivo.</p>

    <form id="downloadForm">
      <label>
        Link
        <input id="url" type="url" placeholder="https://www.youtube.com/watch?v=..." required>
      </label>

      <label>
        Formato
        <select id="format" required>
          <option value="mp3">Musica MP3</option>
          <option value="m4a">Musica M4A</option>
          <option value="wav">Musica WAV</option>
          <option value="mp4">Video MP4</option>
          <option value="webm">Video WEBM</option>
        </select>
      </label>

      <button type="submit">Descargar</button>
    </form>

    <div class="error" id="message"></div>

    <div class="progress-container" id="progressContainer">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressBar"></div>
      </div>
      <div class="progress-text" id="progressText">Iniciando...</div>
    </div>
  </main>

  <script>
    const form = document.querySelector("#downloadForm");
    const urlInput = document.querySelector("#url");
    const formatInput = document.querySelector("#format");
    const message = document.querySelector("#message");
    const submitBtn = document.querySelector("button[type='submit']");
    const progressContainer = document.querySelector("#progressContainer");
    const progressBar = document.querySelector("#progressBar");
    const progressText = document.querySelector("#progressText");

    function cleanName(value) {
      return (value || "archivo")
        .replace(/\.[a-z0-9]{2,5}$/i, "")
        .replace(/[\\/:*?"<>|]+/g, "-")
        .replace(/\s+/g, "-")
        .replace(/-+/g, "-")
        .replace(/^-|-$/g, "")
        .toLowerCase();
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const url = urlInput.value.trim();
      const format = formatInput.value;

      message.classList.remove("show");
      progressContainer.classList.add("show");
      submitBtn.disabled = true;
      progressBar.style.width = "0%";
      progressText.textContent = "Iniciando descarga...";

      const lastPart = decodeURIComponent(new URL(url).pathname.split("/").pop() || "archivo");
      const filename = `${cleanName(lastPart)}.${format}`;

      try {
        const response = await fetch("/api/start", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url, filename, format })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Error al iniciar la descarga");
        }

        const taskId = data.task_id;
        pollProgress(taskId);

      } catch (error) {
        showError(error.message);
      }
    });

    function showError(errText) {
      message.textContent = errText;
      message.classList.add("show");
      progressContainer.classList.remove("show");
      submitBtn.disabled = false;
    }

    async function pollProgress(taskId) {
      try {
        const res = await fetch(`/api/progress/${taskId}`);
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "Error al consultar el progreso");
        }

        if (data.status === "error") {
          throw new Error(data.error || "Ocurrio un error durante la descarga");
        }

        if (data.status === "downloading") {
          progressBar.style.width = data.progress;
          progressText.textContent = `Descargando: ${data.progress}`;
        } else if (data.status === "processing") {
          progressBar.style.width = "100%";
          progressText.textContent = "Procesando archivo (convirtiendo formato)...";
        } else if (data.status === "done") {
          progressBar.style.width = "100%";
          progressText.textContent = "¡Listo! Iniciando descarga en tu navegador...";
          window.location.href = `/download/${taskId}`;
          
          setTimeout(() => {
            progressContainer.classList.remove("show");
            submitBtn.disabled = false;
            urlInput.value = "";
          }, 3000);
          return;
        }

        setTimeout(() => pollProgress(taskId), 1000);

      } catch (error) {
        showError(error.message);
      }
    }
  </script>
</body>
</html>
